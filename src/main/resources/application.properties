spring.application.name=Multi-tenant-application

# Spring Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/multitenant_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Application JWT settings
app.jwt.secret=change-me-to-a-very-strong-secret
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=1209600000

# Server
server.port=8080

# Logging
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

